<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>عيد ميلاد جود 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#d4a574;--gold-light:#e8c9a0;--cream:#faf5ef;
  --dark:#1e160e;--dark2:#3d2e1f;--blush:#f0d9d0;--rose:#c9917a;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
  font-family:'Tajawal',sans-serif;background:var(--dark);
  color:var(--cream);height:100%;width:100%;
  overflow:hidden;position:fixed;inset:0;overscroll-behavior:none;
}
.splash{
  position:fixed;inset:0;z-index:100;background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s ease,visibility .8s ease;
}
.splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
.splash-icon{font-size:4rem;margin-bottom:20px;animation:splashPulse 2s ease-in-out infinite}
@keyframes splashPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.15);opacity:1}}
.splash-name{font-family:'Aref Ruqaa',serif;font-size:clamp(1.8rem,6vw,2.6rem);color:var(--gold);margin-bottom:8px}
.splash-sub{font-size:clamp(.85rem,2.5vw,1rem);color:var(--cream);opacity:.5;margin-bottom:36px;font-weight:300}
.splash-btn{
  background:none;border:1.5px solid var(--gold);color:var(--gold);
  font-family:'Tajawal',sans-serif;font-size:clamp(.95rem,2.8vw,1.1rem);
  padding:14px 40px;border-radius:40px;cursor:pointer;
  transition:all .3s ease;animation:fadeDown 1s ease forwards .5s;opacity:0;touch-action:manipulation;
}
.splash-btn:active{background:var(--gold);color:var(--dark);transform:scale(.95)}
@media(hover:hover){.splash-btn:hover{background:var(--gold);color:var(--dark);transform:scale(1.05);box-shadow:0 0 30px rgba(212,165,116,.3)}}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;width:2.5px;height:2.5px;background:var(--gold-light);border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate;opacity:0}
@keyframes twinkle{0%{opacity:0;transform:scale(.5)}100%{opacity:var(--op);transform:scale(1)}}
.particle{position:fixed;font-size:1.2rem;opacity:0;pointer-events:none;z-index:0;animation:floatUp var(--dur) ease-out forwards}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(0)}12%{opacity:.7;transform:translateY(-30px) scale(1)}100%{opacity:0;transform:translateY(-200px) scale(.3) rotate(40deg)}}
.container{
  position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;padding:var(--safe-top) 16px var(--safe-bottom) 16px;
  padding-top:max(var(--safe-top),12px);padding-bottom:max(var(--safe-bottom),12px);
  opacity:0;transition:opacity .6s ease .3s;
}
.container.visible{opacity:1}
.header{flex-shrink:0;text-align:center;margin-bottom:auto;padding-top:8px}
.top-deco{font-family:'Aref Ruqaa',serif;font-size:clamp(.9rem,2.8vw,1.3rem);color:var(--gold);letter-spacing:2px}
@keyframes fadeDown{0%{opacity:0;transform:translateY(-15px)}100%{opacity:1;transform:translateY(0)}}
.age-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--gold),var(--rose));
  color:var(--dark);font-weight:800;font-size:clamp(.75rem,2.2vw,.95rem);
  padding:5px 18px;border-radius:30px;margin-top:6px;
}
.music-btn{
  position:fixed;top:max(var(--safe-top),12px);right:14px;z-index:50;
  width:42px;height:42px;border-radius:50%;border:1px solid rgba(212,165,116,.25);
  background:rgba(30,22,14,.85);color:var(--gold);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:1.5px;
  backdrop-filter:blur(8px);transition:all .25s ease;touch-action:manipulation;
  opacity:0;pointer-events:none;
}
.music-btn.show{opacity:1;pointer-events:auto}
.music-btn:active{transform:scale(.9)}
.music-btn .bar{display:inline-block;width:2.5px;background:var(--gold);border-radius:2px;animation:eqBar .8s ease-in-out infinite alternate}
.music-btn .bar:nth-child(1){height:8px;animation-delay:0s}
.music-btn .bar:nth-child(2){height:14px;animation-delay:.15s}
.music-btn .bar:nth-child(3){height:10px;animation-delay:.3s}
.music-btn .bar:nth-child(4){height:6px;animation-delay:.45s}
.music-btn.muted .bar{animation:none!important;height:3px!important}
@keyframes eqBar{0%{height:4px}100%{height:16px}}
.card-area{flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-width:520px;min-height:0;padding:10px 0}
.card{
  width:100%;max-height:100%;
  background:linear-gradient(160deg,rgba(35,26,16,.96),rgba(55,40,26,.92));
  border:1px solid rgba(212,165,116,.22);border-radius:20px;
  padding:clamp(20px,4.5vw,36px) clamp(18px,4vw,32px);
  position:relative;overflow:hidden;
  box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 60px rgba(212,165,116,.06),inset 0 1px 0 rgba(255,255,255,.04);
  transition:transform .45s cubic-bezier(.4,0,.2,1),opacity .45s ease;
  display:flex;flex-direction:column;
}
.card.exit-left{transform:translateX(110%) rotateY(-12deg);opacity:0}
.card.exit-right{transform:translateX(-110%) rotateY(12deg);opacity:0}
.card.enter{transform:translateX(0) rotateY(0);opacity:1}
.card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(212,165,116,.05) 0%,transparent 50%);pointer-events:none}
.card-num{position:absolute;top:12px;left:12px;font-size:.68rem;color:var(--gold);opacity:.4;font-weight:300}
.card-icon{font-size:1.8rem;margin-bottom:10px;display:block;animation:pulse 3s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.card-title{font-family:'Aref Ruqaa',serif;font-size:clamp(1.1rem,3.5vw,1.5rem);color:var(--gold);margin-bottom:12px;line-height:1.7;flex-shrink:0}
.card-body{
  font-size:clamp(.9rem,2.6vw,1.05rem);line-height:2;color:var(--cream);font-weight:300;opacity:.92;
  overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  scrollbar-width:thin;scrollbar-color:rgba(212,165,116,.3) transparent;
}
.card-body::-webkit-scrollbar{width:3px}
.card-body::-webkit-scrollbar-track{background:transparent}
.card-body::-webkit-scrollbar-thumb{background:rgba(212,165,116,.3);border-radius:3px}
.card-body.short-text{
  font-family:'Aref Ruqaa',serif;font-size:clamp(1.2rem,4vw,1.75rem);
  line-height:2.2;text-align:center;color:var(--gold-light);font-weight:400;padding:16px 0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;overflow:visible;
}
.card-body.quote-card{
  text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;overflow:visible;padding:10px 0;
}
.card-body.quote-card .q-label{
  font-size:clamp(.75rem,2vw,.85rem);color:var(--rose);opacity:.7;
  font-weight:400;margin-bottom:6px;letter-spacing:1px;
}
.card-body.quote-card .q-text{
  font-family:'Aref Ruqaa',serif;font-size:clamp(1.15rem,3.6vw,1.6rem);
  line-height:2.1;color:var(--gold-light);font-weight:400;
}
.card-body.story-text{
  font-size:clamp(.85rem,2.4vw,.98rem);line-height:2.1;font-weight:300;opacity:.9;flex:1;min-height:0;
}
.card-body.list-card{
  display:flex;flex-direction:column;gap:10px;flex:1;min-height:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  padding:4px 0;
}
.list-item{
  font-size:clamp(.85rem,2.4vw,.98rem);line-height:1.8;
  color:var(--cream);opacity:.88;padding:8px 12px;
  border-right:2px solid rgba(212,165,116,.25);
  font-weight:300;
}
.list-item.en{font-style:italic;direction:ltr;text-align:left;border-right:none;border-left:2px solid rgba(212,165,116,.25)}
.card-quote-mark{font-size:2.4rem;color:var(--gold);opacity:.2;line-height:1;font-family:serif;margin-bottom:4px}
.story-dialogue{color:var(--gold-light);font-family:'Aref Ruqaa',serif;font-size:1.05em;margin:4px 0}
.story-gap{display:block;height:8px}
.footer{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:10px;padding-bottom:6px;margin-top:auto}
.nav{display:flex;align-items:center;gap:20px}
.nav-btn{
  width:52px;height:52px;border-radius:50%;border:1.5px solid rgba(212,165,116,.3);
  background:rgba(35,26,16,.85);color:var(--gold);font-size:1.2rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .25s ease;user-select:none;touch-action:manipulation;
}
.nav-btn:active{background:var(--gold);color:var(--dark);border-color:var(--gold);transform:scale(.92)}
@media(hover:hover){.nav-btn:hover{background:var(--gold);color:var(--dark);border-color:var(--gold);transform:scale(1.08);box-shadow:0 0 18px rgba(212,165,116,.3)}}
.counter{font-size:.82rem;color:var(--gold);opacity:.55;font-weight:300;min-width:65px;text-align:center;font-variant-numeric:tabular-nums}
.progress{width:min(80vw,300px);height:2px;background:rgba(212,165,116,.1);border-radius:2px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--rose));border-radius:2px;transition:width .5s ease}
.signature{font-size:.72rem;color:var(--gold);font-weight:300;opacity:.35}
.confetti-piece{position:fixed;z-index:10;pointer-events:none;border-radius:2px;animation:confettiFall var(--dur) ease-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(0)}}
@media(max-width:380px){.card{padding:18px 16px;border-radius:16px}.card-icon{font-size:1.5rem;margin-bottom:8px}.card-title{font-size:1.05rem;margin-bottom:10px}.nav-btn{width:48px;height:48px}.age-badge{font-size:.72rem;padding:4px 14px}}
@media(max-height:650px){.header{padding-top:2px}.top-deco{font-size:.85rem}.age-badge{font-size:.7rem;padding:3px 12px;margin-top:4px}.card-area{padding:6px 0}.card{padding:16px 14px}.card-icon{font-size:1.4rem;margin-bottom:6px}.card-body.short-text{padding:10px 0;font-size:clamp(1.1rem,3.5vw,1.5rem)}.footer{gap:6px;padding-bottom:2px}.nav-btn{width:44px;height:44px;font-size:1rem}}
</style>
</head>
<body>
<div class="splash" id="splash">
  <div class="splash-icon">🤍</div>
  <div class="splash-name">جود</div>
  <div class="splash-sub">عيد ميلاد سعيد</div>
  <button class="splash-btn" id="splashBtn">افتحي هديتك ✨</button>
</div>
<audio id="audio" loop preload="auto"><source src="song.mp3" type="audio/mpeg"></audio>
<button class="music-btn" id="musicBtn" aria-label="موسيقى">
  <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
</button>
<div class="stars" id="stars"></div>
<div id="particles"></div>
<div class="container" id="main">
  <div class="header">
    <div class="top-deco">✦ عيد ميلاد سعيد ✦</div>
    <div class="age-badge">🎂 ٢٩ سنة من التميّز</div>
  </div>
  <div class="card-area">
    <div class="card enter" id="card">
      <div class="card-num" id="cardNum"></div>
      <span class="card-icon" id="cardIcon"></span>
      <div class="card-title" id="cardTitle"></div>
      <div class="card-body" id="cardBody"></div>
    </div>
  </div>
  <div class="footer">
    <div class="nav">
      <button class="nav-btn" id="nextBtn" aria-label="التالي">→</button>
      <div class="counter" id="counter"></div>
      <button class="nav-btn" id="prevBtn" aria-label="السابق">←</button>
    </div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="signature">صُنعت بحب 🤍 لجود</div>
  </div>
</div>
<script>
const cards=[
// ===== 3 OPENING LONG CARDS =====
{icon:'🤍',title:'كل عام وانتي بخير يا جود',body:'٢٩ سنة من الجمال، الذكاء، والتفاصيل اللي تشبهك وحدك.\nمهما كنتِ مزاجية أو غامضة أحيانًا، يبقى فيك شيء مريح ومميز ما يشبه أحد.\nأتمنى لك سنة أخف على قلبك، وأجمل على روحك، وتكون مليانة أشياء تليق فيك وفي طموحك وضحكتك.\nوصدق؟ الـ٢٩ لايقة عليك جدًا ✨',type:'long'},
{icon:'👑',title:'كل سنة وانتي تكبرين بعيون اللي يحبونك',body:'جمالًا، ووعيًا، وهيبة.\nفيك ذكاء يلفت، وحضور يبقى، وتفاصيل صغيرة تخلي لك مكان مختلف بأي يوم تمرّين فيه.\nأتمنى لك سنة فيها راحة، وضحك كثير، وتحقيق لكل شيء نفسك فيه.\nوكل عام وانتي بخير يا أجمل جوزاء ♊',type:'long'},
{icon:'🌙',title:'بعمر الـ٢٩',body:'يمكن مزاجك يتغير، ويمكنك أحيانًا تكونين بعيدة، لكن يبقى لك شعور مختلف ومكانة ما تتكرر.\nأتمنى لك بعمر الـ٢٩ أيام تشبه قلبك لما يكون مرتاح، وناس يفهمونك بدون شرح، وفرح يليق بروحك الحلوة.\nسنة سعيدة عليك بكل تفاصيلها وانتي احلاها 🤍',type:'long'},

// ===== 4TH: NEW LONG STORY =====
{icon:'🖤',title:'جود',body:'جود ما كانت تدخل المكان… المكان هو اللي ينتبه لها أول.\nتمشي بهدوء، بنظرة باردة شوي، وكأنها شايلة أفكار أكثر من اللي حولها كلهم.\n\nناس كثير كانوا يحسبونها متكبرة، لكن اللي يعرف جود فعلًا يفهم إنها فقط ما تعطي أحد نسخة سهلة منها.\n\nكانت تشبه شخصيات مسلسل Atlanta…\nذكية بطريقة غريبة، ساخرة بدون ما تحاول، ومزاجية كأنها عايشة بين عالمين:\nعالم تقول فيه "ما يفرق معي"،\nوعالم ثاني تخبّي فيه قلب حساس جدًا.\n\nإذا جلست مع الناس، تسمع أكثر مما تتكلم.\nتراقب التفاصيل الصغيرة:\nطريقة ارتباك الشخص، الكذبة اللي بنبرة الصوت، أو الحزن اللي يختبئ خلف الضحك.\n\nوكان عندها عادة غريبة…\nكل ما زعلت، تختفي يوم كامل بدون تفسير، وترجع وكأن شيئًا لم يكن.\nمو لأنها ما تهتم، لكن لأنها كانت تحارب أفكارها بصمت.',type:'story'},

// ===== SOME SHORT CARDS =====
{icon:'🌪️',body:'جود… المزاج اللي حتى تقلباته جميلة',type:'short'},
{icon:'🧠',body:'ذكية لدرجة تخوف… ولطيفة لدرجة تطمّن',type:'short'},
{icon:'🔮',body:'مو كل أحد يفهم جود… وهذي ميزتها',type:'short'},
{icon:'🌊',body:'مرة هدوء… ومرة عاصفة، وكلها تعجبني',type:'short'},

// ===== JOUD QUOTES CARD (LIST) =====
{icon:'💬',title:'أفضل مقولات جود',type:'list',items:[
  {text:'Fall down seven times, stand up eight',en:true},
  {text:'Fake it until you make it',en:true},
  {text:'الغاية تبرر الوسيلة'},
  {text:'لكل حادث حديث'},
  {text:'من له حيلة فليحتال'},
  {text:'لا تأخذك العزة بالإثم'},
]},

// ===== MORE SHORT CARDS =====
{icon:'🌌',body:'جود مو شخصية وحدة… عالم كامل',type:'short'},
{icon:'✨',body:'٢٩ سنة من الذكاء والهيبة والدلال',type:'short'},
{icon:'💛',body:'مزاجية؟ يمكن… بس قلبها يستاهل كل المحاولات',type:'short'},

// ===== مقولات جود (INTERSPERSED) =====
{icon:'🗣️',label:'مقولات جود',body:'أخفي فوضاي بالهدوء… وأنتصر حتى وأنا متعبة.',type:'joud-quote'},

{icon:'😊',body:'أكثر بنت تعرف تخبّي شعورها بابتسامة',type:'short'},
{icon:'🎵',body:'جود تشبه الأغاني اللي ترجع لها مهما ملّيت',type:'short'},

{icon:'🗣️',label:'مقولات جود',body:'مو كل معاركي ظاهرة… لكني ما خسرت نفسي أبدًا.',type:'joud-quote'},

{icon:'🔍',body:'فيها غموض يخليك تبي تعرف أكثر',type:'short'},
{icon:'💎',body:'الجمال بعين الناس… لكن جود حالة خاصة',type:'short'},

{icon:'🗣️',label:'مقولات جود',body:'أسقط كثير… لكن الوقوف صار عادتي.',type:'joud-quote'},

{icon:'😄',body:'إذا ضحكت تنسى الدنيا ثقلها',type:'short'},

{icon:'🏔️',body:'مو سهلة أبدًا… وعشان كذا مميزة',type:'short'},
{icon:'⚡',body:'جود عندها عقل يسبق الكلام',type:'short'},

{icon:'🗣️',label:'مقولات جود',body:'الذكاء عندي وسيلة نجاة، مو مجرد صفة.',type:'joud-quote'},

{icon:'🌹',body:'بعض البنات حضور… وجود أثر',type:'short'},

{icon:'🗣️',label:'مقولات جود',body:'أحيانًا أمثل القوة… لين تصبح حقيقية.',type:'joud-quote'},

{icon:'🪞',body:'كل سنة وانتي النسخة اللي محد يقدر يقلدها',type:'short'},

{icon:'⏳',body:'جود ما تنوصف بسرعة… تنفهم مع الوقت',type:'short'},

{icon:'🗣️',label:'مقولات جود',body:'كبريائي لا يمنعني من الحب… فقط يمنعني من التوسل.',type:'joud-quote'},

{icon:'💅',body:'أنيقة حتى وهي معصبة',type:'short'},
{icon:'🧠',body:'ذكية بشكل يخليك تنتبه لكل كلمة تقولها',type:'short'},

{icon:'🗣️',label:'مقولات جود',body:'كل نسخة مني كانت تحاول النجاة بطريقتها.',type:'joud-quote'},

{icon:'🤗',body:'مو لازم تكون هادئة عشان تكون حنونة',type:'short'},
{icon:'🔥',body:'فيها تناقض جميل بشكل مستفز',type:'short'},

{icon:'🗣️',label:'مقولات جود',body:'أبدو هادئة… لكن بداخلي ألف صوت.',type:'joud-quote'},

{icon:'🧸',body:'مرة طفلة… ومرة أكبر من الكل',type:'short'},
{icon:'🤫',body:'جود من الناس اللي حضورهم يبان حتى بصمتهم',type:'short'},

let current=0,animating=false;
const cardEl=document.getElementById('card'),
  cardNum=document.getElementById('cardNum'),
  cardIcon=document.getElementById('cardIcon'),
  cardTitle=document.getElementById('cardTitle'),
  cardBody=document.getElementById('cardBody'),
  counterEl=document.getElementById('counter'),
  progressBar=document.getElementById('progressBar'),
  audio=document.getElementById('audio'),
  musicBtn=document.getElementById('musicBtn');
let playing=false;

function startMusic(){audio.play().then(()=>{playing=true;musicBtn.classList.remove('muted')}).catch(()=>{})}
musicBtn.addEventListener('click',()=>{
  if(playing){audio.pause();playing=false;musicBtn.classList.add('muted')}
  else{audio.play().then(()=>{playing=true;musicBtn.classList.remove('muted')}).catch(()=>{})}
});

document.getElementById('splashBtn').addEventListener('click',()=>{
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('main').classList.add('visible');
  musicBtn.classList.add('show');startMusic();setTimeout(confetti,400);
});

const starsEl=document.getElementById('stars');
for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${1.5+Math.random()*3}s;--op:${.15+Math.random()*.45};animation-delay:${Math.random()*3}s`;starsEl.appendChild(s)}

function renderCard(idx){
  const c=cards[idx];
  cardNum.textContent=`${idx+1} / ${cards.length}`;
  cardIcon.textContent=c.icon;
  counterEl.textContent=`${idx+1} / ${cards.length}`;
  progressBar.style.width=((idx+1)/cards.length*100)+'%';

  if(c.type==='short'){
    cardTitle.style.display='none';
    cardBody.className='card-body short-text';
    cardBody.innerHTML='<span class="card-quote-mark">❝</span>'+c.body;
  } else if(c.type==='joud-quote'){
    cardTitle.style.display='none';
    cardBody.className='card-body quote-card';
    cardBody.innerHTML='<div class="q-label">'+c.label+'</div><span class="card-quote-mark">❝</span><div class="q-text">'+c.body+'</div>';
  } else if(c.type==='list'){
    cardTitle.style.display='block';cardTitle.textContent=c.title;
    cardBody.className='card-body list-card';
    cardBody.innerHTML=c.items.map(it=>`<div class="list-item${it.en?' en':''}">${it.text}</div>`).join('');
    cardBody.scrollTop=0;
  } else if(c.type==='story'){
    cardTitle.style.display='block';cardTitle.textContent=c.title;
    cardBody.className='card-body story-text';
    let html='';
    c.body.split('\n').forEach(l=>{
      if(l.trim()==='')html+='<span class="story-gap"></span>';
      else if(l.startsWith('"'))html+='<div class="story-dialogue">'+l+'</div>';
      else html+='<div style="margin-bottom:2px">'+l+'</div>';
    });
    cardBody.innerHTML=html;cardBody.scrollTop=0;
  } else {
    cardTitle.style.display='block';cardTitle.textContent=c.title;
    cardBody.className='card-body';
    cardBody.innerHTML=c.body.replace(/\n/g,'<br>');cardBody.scrollTop=0;
  }
}

function goTo(idx){
  if(animating||idx===current)return;animating=true;
  const dir=idx>current?'left':'right';
  cardEl.className='card exit-'+dir;
  setTimeout(()=>{current=idx;renderCard(current);
    cardEl.className='card exit-'+(dir==='left'?'right':'left');
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{cardEl.className='card enter';setTimeout(()=>{animating=false},450)})});
  },350);
}

document.getElementById('nextBtn').onclick=()=>goTo((current+1)%cards.length);
document.getElementById('prevBtn').onclick=()=>goTo((current-1+cards.length)%cards.length);

let touchX=0,touchY=0,swiping=false;
const cardArea=document.querySelector('.card-area');
cardArea.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;swiping=true},{passive:true});
cardArea.addEventListener('touchmove',e=>{if(!swiping)return;if(Math.abs(e.touches[0].clientY-touchY)>Math.abs(e.touches[0].clientX-touchX)){swiping=false}},{passive:true});
cardArea.addEventListener('touchend',e=>{if(!swiping)return;const d=touchX-e.changedTouches[0].clientX;if(Math.abs(d)>45){d<0?goTo((current+1)%cards.length):goTo((current-1+cards.length)%cards.length)}swiping=false},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goTo((current+1)%cards.length);if(e.key==='ArrowRight')goTo((current-1+cards.length)%cards.length)});

function confetti(){
  const colors=['#d4a574','#e8c9a0','#f0d9d0','#c9917a','#fff'];
  for(let i=0;i<35;i++){const c=document.createElement('div');c.className='confetti-piece';const sz=4+Math.random()*7;
    c.style.cssText=`left:${35+Math.random()*30}%;top:${25+Math.random()*25}%;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${(Math.random()-.5)*350}px;--ty:${(Math.random()-.5)*350}px;--rot:${Math.random()*720}deg;--dur:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.3}s;width:${sz}px;height:${sz}px;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),3000)}
}
function spawnParticle(){const emojis=['✨','🤍','💛','⭐','🌙','♊'];const p=document.createElement('div');p.className='particle';p.textContent=emojis[Math.floor(Math.random()*emojis.length)];p.style.cssText=`left:${10+Math.random()*80}%;top:${55+Math.random()*35}%;--dur:${3+Math.random()*3}s;font-size:${.9+Math.random()*.7}rem`;document.getElementById('particles').appendChild(p);setTimeout(()=>p.remove(),6000)}
setInterval(spawnParticle,2500);
renderCard(0);
</script>

</html>
